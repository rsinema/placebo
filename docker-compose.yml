services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  analytics_bot:
    build: ./analytics_bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
